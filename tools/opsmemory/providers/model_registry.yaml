# OpsMemory Model Capability Registry
#
# Tracks approved and experimental models for use with OpsMemory.
# Fields:
#   id               - LiteLLM-format model identifier
#   provider         - Provider family (anthropic, openai, bedrock, cohere, local)
#   release_date     - Optional ISO-8601 date (YYYY-MM-DD) when model was released
#   supports_generation  - Can be used for LLM text generation
#   supports_embeddings  - Can be used for vector embeddings
#   supports_structured  - Supports structured / JSON output (tool calls)
#   supports_rerank      - Supports reranking
#   mcp_safe             - Safe to expose as an MCP-facing tool
#   production_approved  - Approved for production workloads
#   embedding_dim        - Embedding vector dimension (null for generation-only models)
#   notes            - Free-text notes

models:
  # ---------------------------------------------------------------------------
  # Anthropic / Claude — generation
  # ---------------------------------------------------------------------------
  - id: anthropic/claude-3-5-sonnet-20241022
    provider: anthropic
    release_date: "2024-10-22"
    supports_generation: true
    supports_embeddings: false
    supports_structured: true
    supports_rerank: false
    mcp_safe: true
    production_approved: true
    embedding_dim: null
    notes: "Claude 3.5 Sonnet — recommended production LLM for OpsMemory summarisation."

